services:
  sub-store:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SUB_STORE_FRONTEND_REPO: ${SUB_STORE_FRONTEND_REPO:-https://github.com/sub-store-org/Sub-Store-Front-End.git}
        SUB_STORE_FRONTEND_REF: ${SUB_STORE_FRONTEND_REF:-master}
    image: sub-store:local
    container_name: sub-store
    restart: unless-stopped
    ports:
      - "${SUB_STORE_PORT:-3000}:3000"
    environment:
      TZ: ${TZ:-Asia/Hong_Kong}
      SUB_STORE_DOCKER: "true"
      SUB_STORE_BACKEND_API_HOST: 0.0.0.0
      SUB_STORE_BACKEND_API_PORT: "3000"
      SUB_STORE_BACKEND_MERGE: "true"
      SUB_STORE_FRONTEND_BACKEND_PATH: /api
      SUB_STORE_FRONTEND_PATH: /app/frontend
      SUB_STORE_DATA_BASE_PATH: /opt/sub-store/data
    volumes:
      - sub-store-data:/opt/sub-store/data

volumes:
  sub-store-data:
